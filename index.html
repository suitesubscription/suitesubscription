*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
background: var(--black);
color: var(--white);
font-family: 'DM Sans', sans-serif;
overflow-x: hidden;
}

/* GRAIN OVERLAY */
body::before {
content: '';
position: fixed;
inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
pointer-events: none;
z-index: 1000;
opacity: 0.4;
}

/* NAV */
nav {
position: fixed;
top: 0;
width: 100%;
z-index: 999;
padding: 1.5rem 3rem;
display: flex;
justify-content: space-between;
align-items: center;
background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
backdrop-filter: blur(4px);
}

.logo {
font-family: 'Playfair Display', serif;
font-size: 1.3rem;
font-weight: 700;
color: var(--gold);
letter-spacing: 0.02em;
text-decoration: none;
}

.logo span { color: var(--white); }

nav a.cta-nav {
background: var(--gold);
color: var(--black);
padding: 0.6rem 1.4rem;
border-radius: 2px;
font-weight: 600;
font-size: 0.85rem;
text-decoration: none;
letter-spacing: 0.04em;
text-transform: uppercase;
transition: background 0.2s;
}

nav a.cta-nav:hover { background: var(--gold-light); }

nav a.cta-nav-owner {
background: transparent;
color: var(--gold);
padding: 0.6rem 1.4rem;
border-radius: 2px;
border: 1px solid var(--gold);
font-weight: 600;
font-size: 0.85rem;
text-decoration: none;
letter-spacing: 0.04em;
text-transform: uppercase;
transition: all 0.2s;
cursor: pointer;
}
nav a.cta-nav-owner:hover { background: var(--gold); color: var(--black); }

/* OWNER MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
z-index: 2000;
align-items: center;
justify-content: center;
padding: 1.5rem;
backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; animation: fadeUp 0.3s ease both; }

.modal-box {
background: #141414;
border: 1px solid rgba(245,230,66,0.25);
border-radius: 6px;
padding: 3rem;
max-width: 560px;
width: 100%;
position: relative;
}

.modal-close {
position: absolute;
top: 1.25rem;
right: 1.5rem;
background: none;
border: none;
color: var(--muted);
font-size: 1.5rem;
cursor: pointer;
line-height: 1;
transition: color 0.2s;
}
.modal-close:hover { color: var(--white); }

.modal-badge {
display: inline-block;
background: rgba(245,230,66,0.1);
border: 1px solid rgba(245,230,66,0.3);
color: var(--gold);
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
padding: 0.3rem 0.8rem;
border-radius: 2px;
margin-bottom: 1.25rem;
}

.modal-box h2 {
font-family: 'Playfair Display', serif;
font-size: 1.9rem;
font-weight: 700;
line-height: 1.15;
margin-bottom: 0.5rem;
}
.modal-box h2 em { font-style: italic; color: var(--gold); }

.modal-box p {
color: var(--muted);
font-size: 0.9rem;
line-height: 1.6;
margin-bottom: 2rem;
}

.modal-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 1rem;
margin-bottom: 1.25rem;
}

.modal-field {
display: flex;
flex-direction: column;
gap: 0.4rem;
}
.modal-field.full { grid-column: 1 / -1; }

.modal-field label {
font-size: 0.7rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(--muted);
font-weight: 600;
}

.modal-field input,
.modal-field select {
background: #F9F9F9;
border: 1px solid rgba(255,255,255,0.1);
border-radius: 2px;
color: var(--white);
font-family: 'DM Sans', sans-serif;
font-size: 0.92rem;
padding: 0.8rem 1rem;
width: 100%;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
}
.modal-field input:focus,
.modal-field select:focus { border-color: var(--gold); background: #1e1c11; }
.modal-field select option { background: #F9F9F9; }

.modal-submit {
width: 100%;
background: var(--gold);
color: var(--black);
border: none;
padding: 1rem;
font-family: 'DM Sans', sans-serif;
font-size: 0.95rem;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 0.06em;
border-radius: 2px;
cursor: pointer;
transition: all 0.25s;
margin-top: 0.5rem;
}
.modal-submit:hover { background: var(--gold-light); box-shadow: 0 6px 20px rgba(245,230,66,0.3); }

.modal-success {
text-align: center;
padding: 2rem 0 1rem;
display: none;
}
.modal-success .icon { font-size: 2.5rem; margin-bottom: 1rem; }
.modal-success h3 {
font-family: 'Playfair Display', serif;
font-size: 1.5rem;
margin-bottom: 0.5rem;
}
.modal-success p { font-size: 0.88rem; color: var(--muted); }

/* OWNER HERO BANNER */
.owner-banner {
background: linear-gradient(135deg, rgba(245,230,66,0.06), rgba(245,230,66,0.02));
border: 1px solid rgba(245,230,66,0.2);
border-radius: 4px;
padding: 1.4rem 2rem;
display: flex;
align-items: center;
justify-content: space-between;
gap: 1.5rem;
flex-wrap: wrap;
margin-top: 3rem;
animation: fadeUp 0.8s 0.6s ease both;
opacity: 0;
}
.owner-banner.visible { opacity: 1; }

.owner-banner-text strong {
display: block;
font-size: 1rem;
font-weight: 700;
color: var(--white);
margin-bottom: 0.2rem;
}
.owner-banner-text span {
font-size: 0.82rem;
color: var(--muted);
}

.btn-owner {
background: var(--gold);
color: var(--black);
padding: 0.8rem 1.8rem;
font-weight: 700;
font-size: 0.85rem;
border: none;
border-radius: 2px;
text-transform: uppercase;
letter-spacing: 0.06em;
cursor: pointer;
transition: all 0.25s;
white-space: nowrap;
font-family: 'DM Sans', sans-serif;
}
.btn-owner:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,230,66,0.3); }

/* HERO */
.hero {
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: flex-start;
padding: 8rem 3rem 4rem;
position: relative;
overflow: hidden;
}

.hero::after {
content: '';
position: absolute;
right: -10%;
top: 0;
width: 65%;
height: 100%;
background: radial-gradient(ellipse at 70% 50%, rgba(29,185,84,0.07) 0%, transparent 70%);
pointer-events: none;
}

.hero-badge {
display: inline-flex;
align-items: center;
gap: 0.5rem;
background: rgba(29,185,84,0.12);
border: 1px solid rgba(29,185,84,0.35);
color: var(--green);
padding: 0.4rem 1rem;
border-radius: 2px;
font-size: 0.78rem;
letter-spacing: 0.1em;
text-transform: uppercase;
font-weight: 600;
margin-bottom: 2rem;
animation: fadeUp 0.8s ease both;
}

.hero-badge::before {
content: '';
width: 6px;
height: 6px;
border-radius: 50%;
background: var(--gold);
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.8); }
}

.hero h1 {
font-family: 'Playfair Display', serif;
font-size: clamp(3.5rem, 8vw, 7.5rem);
font-weight: 900;
line-height: 1.0;
max-width: 820px;
animation: fadeUp 0.8s 0.15s ease both;
}

.hero h1 em {
font-style: italic;
color: var(--gold);
}

.hero p {
font-size: 1.2rem;
color: #999;
max-width: 500px;
line-height: 1.7;
margin: 1.5rem 0 2.5rem;
font-weight: 300;
animation: fadeUp 0.8s 0.3s ease both;
}

.hero-ctas {
display: flex;
gap: 1rem;
flex-wrap: wrap;
animation: fadeUp 0.8s 0.45s ease both;
}

.btn-primary {
background: var(--green);
color: var(--white);
padding: 1rem 2.5rem;
font-weight: 700;
font-size: 1rem;
text-decoration: none;
border-radius: 2px;
text-transform: uppercase;
letter-spacing: 0.06em;
transition: all 0.25s;
display: inline-block;
}

.btn-primary:hover {
background: var(--green-dark);
transform: translateY(-2px);
box-shadow: 0 8px 30px rgba(29,185,84,0.35);
}

.btn-ghost {
background: transparent;
color: var(--white);
padding: 1rem 2.5rem;
font-weight: 500;
font-size: 1rem;
text-decoration: none;
border-radius: 2px;
border: 1px solid rgba(255,255,255,0.2);
text-transform: uppercase;
letter-spacing: 0.06em;
transition: all 0.25s;
display: inline-block;
}

.btn-ghost:hover {
border-color: var(--green);
color: var(--green);
transform: translateY(-2px);
}

/* SCROLL INDICATOR */
.scroll-line {
position: absolute;
bottom: 2rem;
left: 3rem;
display: flex;
align-items: center;
gap: 1rem;
color: var(--muted);
font-size: 0.75rem;
letter-spacing: 0.12em;
text-transform: uppercase;
animation: fadeUp 1s 0.8s ease both;
}

.scroll-line::before {
content: '';
width: 50px;
height: 1px;
background: var(--muted);
}

/* STATS BAR */
.stats-bar {
background: var(--charcoal);
border-top: 1px solid rgba(255,255,255,0.06);
border-bottom: 1px solid rgba(255,255,255,0.06);
padding: 2.5rem 3rem;
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 2rem;
text-align: center;
}

.stat-item strong {
display: block;
font-family: 'Playfair Display', serif;
font-size: 2.5rem;
color: var(--gold);
font-weight: 700;
line-height: 1;
}

.stat-item span {
font-size: 0.8rem;
color: var(--muted);
text-transform: uppercase;
letter-spacing: 0.1em;
margin-top: 0.4rem;
display: block;
}

/* SECTION STYLES */
section {
padding: 7rem 3rem;
max-width: 1200px;
margin: 0 auto;
}

.section-label {
font-size: 0.75rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(--green);
font-weight: 600;
margin-bottom: 1rem;
}

.section-title {
font-family: 'Playfair Display', serif;
font-size: clamp(2.2rem, 4vw, 3.5rem);
font-weight: 700;
line-height: 1.15;
max-width: 600px;
margin-bottom: 1.5rem;
}

.section-title em {
font-style: italic;
color: var(--gold);
}

/* HOW IT WORKS */
.steps {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 3rem;
margin-top: 4rem;
}

.step {
position: relative;
padding-left: 1.5rem;
border-left: 2px solid rgba(29,185,84,0.2);
transition: border-color 0.3s;
}

.step:hover { border-color: var(--green); }

.step-num {
font-family: 'Playfair Display', serif;
font-size: 3rem;
color: rgba(29,185,84,0.15);
font-weight: 900;
line-height: 1;
margin-bottom: 0.5rem;
}

.step h3 {
font-size: 1.1rem;
font-weight: 600;
margin-bottom: 0.75rem;
color: var(--white);
}

.step p {
font-size: 0.9rem;
color: var(--muted);
line-height: 1.7;
}

#pricing > * {
